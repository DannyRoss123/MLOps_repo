name: Data Quality Check

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC (2am ET) — catches overnight ETL issues before business hours
  push:
    branches: [main]
    paths:
      - 'week3/data/**'
      - 'week3/validation/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow numpy pytest

      - name: Run data quality validation
        id: validate
        run: |
          cd week3
          python3 -m validation.check_data_quality

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: validation-report
          path: week3/validation-results.json

      - name: Block deployment if validation fails
        if: failure()
        run: |
          echo "Data validation FAILED — see validation-report artifact for details"
          exit 1

      - name: Validation passed
        if: success()
        run: echo "Data quality validation passed"
