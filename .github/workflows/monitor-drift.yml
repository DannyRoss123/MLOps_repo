name: Drift Monitoring

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8am UTC (4am ET) — after overnight ETL, before US business hours
  push:
    branches: [main]
    paths:
      - 'week4/data/**'
      - 'week4/scripts/**'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow numpy scipy scikit-learn

      - name: Compute monitoring metrics
        id: metrics
        run: |
          cd week4
          python3 scripts/compute_metrics.py

      - name: Detect drift patterns
        id: drift
        run: |
          cd week4
          python3 scripts/detect_drift.py

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-metrics
          path: week4/metrics-results.json

      - name: Create alert if drift detected
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Drift detected in monitoring',
              body: 'Monitoring workflow detected data or concept drift. Check workflow logs for details.',
              labels: ['drift-alert']
            })

      - name: Monitoring complete
        if: success()
        run: echo "Drift monitoring complete - no issues detected"
